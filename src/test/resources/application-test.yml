spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema/domain-A.sql,classpath:schema/domain-B.sql,classpath:schema/domain-C.sql,classpath:schema/domain-D.sql,classpath:schema/index.sql

mybatis:
  mapper-locations: classpath*:xenosoft/imldintelligence/module/**/internal/repository/*.xml
  type-handlers-package: xenosoft.imldintelligence.common.mybatis
  configuration:
    map-underscore-to-camel-case: true
