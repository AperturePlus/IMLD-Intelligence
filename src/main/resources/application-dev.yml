spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/imld_core?sslmode=disable&characterEncoding=utf8
    username: postgres
    password: postgres
  sql:
    init:
      mode: always

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  kafka:
    bootstrap-servers: localhost:9092
    client-id: imld-intelligence-dev
    consumer:
      group-id: imld-intelligence-dev-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all

imld:
  deployment:
    mode: saas
    tenant-mode: multi-tenant
  cloud-bridge:
    enabled: false
  licensing:
    private-edition:
      startup-validation-enabled: false
      machine-binding-enabled: false
  upgrade:
    check-enabled: false
